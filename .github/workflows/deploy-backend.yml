name: Deploy backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'rawr-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rawr-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('rawr-backend/**/*.gradle*', 'rawr-backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Install SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/rawr-key.pem
          chmod 600 ~/.ssh/rawr-key.pem

      - name: Copy JAR to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/rawr-key.pem -o StrictHostKeyChecking=accept-new \
            build/libs/rawr-backend-0.0.1-SNAPSHOT.jar \
            "$EC2_USER@$EC2_HOST:/home/ec2-user/rawr/app.jar"

      - name: Restart service via deploy.sh
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/rawr-key.pem -o StrictHostKeyChecking=accept-new \
            "$EC2_USER@$EC2_HOST" 'bash /home/ec2-user/rawr/deploy.sh'

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 10
            CODE=$(curl -s -o /dev/null -w '%{http_code}' https://api.rawr.co.kr/api/articles?size=1 || echo 000)
            echo "attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              exit 0
            fi
          done
          echo "Backend did not return 200 within 60 seconds after deploy"
          exit 1
